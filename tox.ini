[tox]
envlist=
    docs,
    py38-django{32,42},
    py39-django{32,42},
    py310-django{32,42,52},
    py311-django{42,52},
    py312-django{42,52},
    py313-django{42,52},
    ruff

[testenv]
changedir=
    oidc_provider
deps =
    django32: django>=3.2,<3.3
    django42: django>=4.2,<4.3
    django52: django>=5.2,<5.3
    freezegun
    psycopg2-binary
    pytest
    pytest-django
    pytest-cov

commands =
    pytest --cov=oidc_provider {posargs}

[testenv:docs]
basepython = python3.11
changedir = docs
allowlist_externals =
    mkdir
deps =
    sphinx
    sphinx_rtd_theme
commands =
    mkdir -p _static/
    sphinx-build -v -W -b html -d {envtmpdir}/doctrees -D html_static_path="_static" . {envtmpdir}/html

[testenv:ruff]
basepython = python3.11
deps =
    ruff
commands =
    ruff check --diff
    ruff format --check --diff

[pytest]
DJANGO_SETTINGS_MODULE = oidc_provider.tests.settings
python_files = test_*.py
